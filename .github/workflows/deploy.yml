name: Deploy

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy:
    permissions: write-all
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: get version
        if: startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'hotfix/')
        id: getVersion
        run: | # pull the version from the name of the branch.
          fullName="${{ github.head_ref }}"
          version="${fullName#*/}"
          echo "versionNumber=$version" >> $GITHUB_ENV

      - name: increment patch version
        if: startsWith(github.head_ref, 'patch/')
        id: increment_patch_version
        run: | # Get the latest tag from the repository and increment the patch version.
          TAGS=$(git tag -l | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$')
          if [ -z "$TAGS" ]; then
            echo "No semver-like tags found"
            exit 1
          fi
          LATEST_TAG=$(echo "$TAGS" | sort -V | tail -n 1)
          echo "versionNumber=$LATEST_TAG" >> $GITHUB_ENV
          echo "Latest tag: $LATEST_TAG"
          
          MAJOR=$(echo $LATEST_TAG | cut -d. -f1)
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)
          echo "Current version: $MAJOR.$MINOR.$PATCH"
          
          PATCH=$((PATCH + 1))
          echo "Incremented patch version: $PATCH"
          
          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT_VERSION"
          echo "versionNumber=$NEXT_VERSION" >> $GITHUB_ENV


      - name: create github release
        uses: softprops/action-gh-release@v2
        id: create_release
        with:
          draft: false
          name: ${{ env.versionNumber }}
          tag_name: ${{ env.versionNumber }}
          body: ${{ github.event.pull_request.body }}
          token: ${{ secrets.GITHUB_TOKEN }}

